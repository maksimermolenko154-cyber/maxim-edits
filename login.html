<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maxim Edits — Вход для клиентов</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div style="max-width:400px; margin:100px auto; background:#181828; padding:30px; border-radius:20px; text-align:center; border:1px solid #25253a;">
        <h1>👤 Вход для клиентов</h1>
        <p style="color:#8b8ba3;">Введите ваш Telegram, чтобы проверить статус заказа</p>
        <div id="errorBlock" style="color:#ff4a4a; display:none; margin-bottom:10px;">Заказ не найден!</div>
        <form>
            <input type="text" id="clientTelegramInput" placeholder="Например, @vxpm3" required style="width:100%; padding:12px; margin-bottom:15px; background:#25253a; color:white; border:1px solid #25253a; border-radius:10px;">
            <button type="submit" style="width:100%; padding:12px; background:#765cff; color:white; border:0; border-radius:10px; font-weight:bold;">Войти</button>
        </form>
        <br><a href="index.html" style="color:#8b8ba3; text-decoration:none;">← На главную</a>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
